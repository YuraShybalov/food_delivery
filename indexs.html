<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="logo">
          <svg
            class="logo-icon"
            width="41"
            height="32"
            aria-label="Food delivery logo"
          >
            <use href="./images/icons/icons.svg#Logo"></use>
          </svg>
        </div>
        <div class="nav-tablet-pc" id="mobile-menu">
          <button
            class="clous-burger-nav"
            type="button"
            aria-label="Close navigation menu"
          >
            <svg width="24" height="24" aria-label="Close menu">
              <use href="./images/icons/icons.svg#clous"></use>
            </svg>
          </button>
          <nav>
            <ul class="nav-links">
              <li><a href="#home">Home</a></li>
              <li><a href="#about">About</a></li>
              <li><a href="#service">Service</a></li>
              <li><a href="#menu">Menu</a></li>
              <li><a href="#contact">Contact</a></li>
            </ul>
          </nav>
          <button class="btm-order">Order Now</button>
        </div>
        <button
          class="btn-burger-menu"
          type="button"
          aria-label="Open navigation menu"
          aria-expanded="false"
          aria-controls="mobile-menu"
        >
          <svg width="28" height="28" aria-label="Menu">
            <use href="./images/icons/icons.svg#burger_menu"></use>
          </svg>
        </button>
      </div>
    </header>

    <main>
      <section class="hero" id="home">
        <div class="container">
          <div class="hero-content">
            <h1 class="hero-title">Enjoy Your Favorite Food From Anywhere</h1>
            <p class="hero-text">
              Lorem ipsum dolor sit amet, consectetur adipiscing elit.
              Suspendisse varius enim in eros elementum tristique. Duis cursus,
              mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam
              libero vitae erat.
            </p>
            <button class="hero-button" type="button">Order Now</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./js/main.js" defer></script>
  </body>
</html>
